<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chalkboard</title>
  <link rel="stylesheet" href="chalkboard.css">
  <script>try { if (localStorage.getItem('cb-theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) {}</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="icon" type="img/png" href="./images/chalkboard.png">
</head>
<body>
  <div id="viewport">
    <div id="world"></div>
  </div>

  <!-- brand (click to switch light / dark) -->
  <div id="brand" title="Switch light / dark">
    <span id="mark">Chalkboard</span>
  </div>

  <!-- marquee selection box -->
  <div id="marquee"></div>

  <!-- selection overlay (screen space) -->
  <div id="selbox">
    <div class="frame"></div>
    <div class="rotate-arm"></div>
    <div class="handle rot"></div>
    <div class="handle r tl" data-corner="tl"></div>
    <div class="handle r tr" data-corner="tr"></div>
    <div class="handle r bl" data-corner="bl"></div>
    <div class="handle r br" data-corner="br"></div>
  </div>

  <!-- right-click context menu (on element) -->
  <div id="ctxmenu" class="ctx">
    <button data-act="delete" class="danger">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.5 2.6h5a1 1 0 0 1 .92.6l.66 1.5H7.92l.66-1.5a1 1 0 0 1 .92-.6Z"></path><rect x="3.6" y="4.6" width="16.8" height="2.3" rx="1.1"></rect><path d="M6.4 7.9h11.2l-.86 11.1a2.1 2.1 0 0 1-2.1 1.94H9.36a2.1 2.1 0 0 1-2.1-1.94L6.4 7.9Z"></path></svg>
      <span>Delete</span>
    </button>
    <button data-act="back">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="13" height="13" rx="2" fill="currentColor"></rect><rect x="9" y="9" width="13" height="13" rx="2" fill="#fff" stroke="currentColor" stroke-width="1.8"></rect></svg>
      <span>Send to back</span>
    </button>
    <button data-act="front">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="13" height="13" rx="2" fill="#fff" stroke="currentColor" stroke-width="1.8"></rect><rect x="9" y="9" width="13" height="13" rx="2" fill="currentColor"></rect></svg>
      <span>Bring to front</span>
    </button>
    <button data-act="dup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"></rect><path d="M5 15V5a2 2 0 0 1 2-2h8"></path></svg>
      <span>Duplicate</span>
    </button>
    <button data-act="download">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"></path><path d="m7 11 5 5 5-5"></path><path d="M5 21h14"></path></svg>
      <span>Download</span>
    </button>
  </div>

  <!-- right-click context menu (empty space) -->
  <div id="ctxmenu-empty" class="ctx">
    <button data-act="add" class="add">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.4a1 1 0 0 1 .74.33l5 5.5A1 1 0 0 1 17 9.9h-2.6v4.7a1.4 1.4 0 0 1-1.4 1.4h-2a1.4 1.4 0 0 1-1.4-1.4V9.9H7a1 1 0 0 1-.74-1.67l5-5.5A1 1 0 0 1 12 2.4Z"></path><rect x="4" y="18.1" width="16" height="2.7" rx="1.35"></rect></svg>
      <span>Add</span>
    </button>
    <button data-act="paste">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="3" width="8" height="4" rx="1.4"></rect><path d="M9 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3"></path></svg>
      <span>Paste</span>
    </button>
  </div>

  <!-- top-right tools -->
  <div id="tools" class="chrome">
    <button id="tl-upload" title="Upload a file">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.4a1 1 0 0 1 .74.33l5 5.5A1 1 0 0 1 17 9.9h-2.6v4.7a1.4 1.4 0 0 1-1.4 1.4h-2a1.4 1.4 0 0 1-1.4-1.4V9.9H7a1 1 0 0 1-.74-1.67l5-5.5A1 1 0 0 1 12 2.4Z"></path><rect x="4" y="18.1" width="16" height="2.7" rx="1.35"></rect></svg>
    </button>
    <button id="tl-pdf" title="Save board as PDF">
      <svg viewBox="0 0 24 24" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"><path d="M4 3a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7.84a1 1 0 0 0-.29-.71l-3.84-3.84A1 1 0 0 0 16.16 3H4Zm3.2 1.7h7v3.7a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1V4.7Zm5 .5v3.7h-1.5V5.2h1.5ZM6.6 13.4a1 1 0 0 1 1-1h8.8a1 1 0 0 1 1 1v5.9H6.6v-5.9Z"></path></svg>
    </button>
    <button id="tl-clear" class="danger" title="Clear board">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.5 2.6h5a1 1 0 0 1 .92.6l.66 1.5H7.92l.66-1.5a1 1 0 0 1 .92-.6Z"></path><rect x="3.6" y="4.6" width="16.8" height="2.3" rx="1.1"></rect><path d="M6.4 7.9h11.2l-.86 11.1a2.1 2.1 0 0 1-2.1 1.94H9.36a2.1 2.1 0 0 1-2.1-1.94L6.4 7.9Z"></path></svg>
    </button>
  </div>

  <!-- bottom-left zoom -->
  <div id="zoom" class="chrome">
    <button id="z-out" title="Zoom out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 12h14"></path></svg>
    </button>
    <span class="pct" title="Fit to content">100%</span>
    <button id="z-in" title="Zoom in">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg>
    </button>
  </div>

  <div id="toast"></div>

  <!-- in-app Save dialog (used when the native file picker is unavailable) -->
  <div id="savewrap">
    <div id="savecard" role="dialog" aria-modal="true" aria-labelledby="savetitle">
      <h2 id="savetitle">Save board as PDF</h2>
      <p>Choose a file name. It'll be saved to your browser's downloads folder.</p>
      <div class="field">
        <input id="savename" type="text" value="Chalkboard" spellcheck="false" autocomplete="off">
        <span class="suffix">.pdf</span>
      </div>
      <div class="row">
        <button class="cancel" id="savecancel">Cancel</button>
        <button class="save" id="saveok">Save</button>
      </div>
    </div>
  </div>

  <input id="file-input" type="file" multiple style="display:none">

  <script src="store.js"></script>
  <script src="export.js"></script>
  <script src="chalkboard.js"></script>
</body>
</html>
